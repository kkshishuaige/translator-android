name: Build APK with Qwen3-ASR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download llama.cpp Android libs
        run: |
          echo "下载 llama.cpp Android arm64-v8a 预编译库..."
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -sL -o /tmp/llama-android.tar.gz \
            "https://github.com/ggml-org/llama.cpp/releases/download/b10068/llama-b10068-bin-android-arm64.tar.gz"
          mkdir -p /tmp/llama-extracted/
          tar -xzf /tmp/llama-android.tar.gz -C /tmp/llama-extracted/ 2>/dev/null || true
          find /tmp/llama-extracted/ -name "*.so" -exec cp {} app/src/main/jniLibs/arm64-v8a/ \; 2>/dev/null || true
          ls -lh app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || echo "no .so files"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            curl -sL "https://services.gradle.org/distributions/gradle-8.9-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-8.9/bin/gradle wrapper --gradle-version 8.9
            chmod +x gradlew
          fi

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: translator-apk
          path: |
            app/build/outputs/apk/debug/*.apk
