name: Build APK with Gemma 4

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate gradle wrapper
        run: |
          if [ ! -f gradlew ]; then
            apt-get update -qq && apt-get install -y -qq gradle 2>/dev/null || true
            gradle wrapper --gradle-version 8.5 2>/dev/null || true
            if [ ! -f gradlew ]; then
              curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
              unzip -q /tmp/gradle.zip -d /tmp/gradle
              /tmp/gradle/gradle-8.5/bin/gradle wrapper
            fi
            chmod +x gradlew
          fi

      - name: Build Debug APK with logs
        run: |
          ./gradlew assembleDebug --stacktrace --info 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: translator-apk-gemma4
          path: |
            app/build/outputs/apk/debug/*.apk
